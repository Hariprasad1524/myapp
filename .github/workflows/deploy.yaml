name: Build and Deploy to AKS

# Trigger: run on every push to the main branch
on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: myapp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Log in to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Log in to Azure Container Registry
      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # 4️⃣ Build and push the Docker image
      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }} .
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      # 5️⃣ Connect kubectl to your AKS cluster
      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER }}

      # 6️⃣ Update the image in the deployment manifest
      - name: Update image tag in manifest
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ secrets.ACR_NAME }}.azurecr.io/$IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml

      # 7️⃣ Deploy everything to AKS
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # 8️⃣ Verify the rollout
      - name: Verify deployment
        run: |
          kubectl rollout status deployment/myapp
          kubectl get pods
          kubectl get services
