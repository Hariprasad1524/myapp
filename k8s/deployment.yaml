apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 3                 # ← creates 3 pod replicas
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: IMAGE_PLACEHOLDER    # ← workflow replaces this automatically
          ports:
            - containerPort: 8080
